<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Happy Birthday Ila ♡</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300;400;500;600&family=Press+Start+2P&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Fredoka', sans-serif;
  overflow-x: hidden;
  min-height: 100vh;
  background: linear-gradient(135deg, #ffd6ec, #d9f0ff, #e6d8ff);
  color: #b30059; /* 💗 DARK PINK TEXT */
}

/* background glow */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(circle at top left, rgba(255,255,255,0.6), transparent 35%),
    radial-gradient(circle at bottom right, rgba(255,255,255,0.4), transparent 35%);
  z-index: -1;
}

/* loading screen */
.loading-screen {
  position: fixed;
  inset: 0;
  background: linear-gradient(135deg, #ffcce6, #d9f0ff, #e5d4ff);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  z-index: 99999;
  transition: opacity 1s ease;
  color: #b30059;
  font-weight: bold;
}

.loading-screen.hidden {
  opacity: 0;
  pointer-events: none;
}

/* hearts */
.floating-hearts {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 1;
}

.heart {
  position: absolute;
  color: rgba(179,0,89,0.4);
  animation: float 8s linear infinite;
}

@keyframes float {
  from { transform: translateY(100vh); }
  to { transform: translateY(-10vh); }
}

/* layout */
.container {
  position: relative;
  z-index: 2;
  display: flex;
  justify-content: center;
  padding: 30px;
}

.card {
  max-width: 850px;
  width: 100%;
  background: rgba(255,255,255,0.25);
  backdrop-filter: blur(20px);
  border-radius: 35px;
  padding: 40px;
  text-align: center;
  box-shadow: 0 10px 30px rgba(0,0,0,0.1);
}

.subtitle {
  letter-spacing: 4px;
  font-size: 12px;
  margin-bottom: 10px;
  opacity: 0.8;
}

.title {
  font-size: 60px;
  font-weight: 700;
  color: #c2185b;
}

.name {
  font-size: 35px;
  margin-top: 10px;
}

.intro {
  margin-top: 25px;
  padding: 25px;
  background: rgba(255,255,255,0.3);
  border-radius: 25px;
}

button {
  margin-top: 20px;
  padding: 12px 25px;
  border-radius: 999px;
  border: none;
  cursor: pointer;
  background: white;
  color: #b30059;
  font-weight: bold;
}

/* memories */
.memory {
  display: none;
  margin-top: 20px;
}

.memory.active {
  display: block;
}

.polaroid {
  background: white;
  padding: 15px 15px 60px;
  border-radius: 12px;
  width: 280px;
  margin: 20px auto;
  box-shadow: 0 10px 25px rgba(0,0,0,0.15);
}

.polaroid img {
  width: 100%;
  height: 260px;
  object-fit: cover;
  border-radius: 8px;
}

.polaroid span {
  display: block;
  margin-top: 10px;
  color: #b30059;
}

/* chat */
.chat-box {
  margin-top: 30px;
  text-align: left;
  background: rgba(255,255,255,0.25);
  padding: 20px;
  border-radius: 25px;
}

.chat-msg {
  margin-bottom: 10px;
  padding: 10px 15px;
  border-radius: 15px;
  width: fit-content;
  max-width: 80%;
}

.me {
  background: rgba(255,255,255,0.4);
}

.her {
  background: rgba(255,182,193,0.4);
  margin-left: auto;
}

/* popup */
.popup {
  position: fixed;
  inset: 0;
  display: none;
  align-items: center;
  justify-content: center;
  background: rgba(0,0,0,0.3);
  z-index: 9999;
}

.popup-content {
  background: white;
  padding: 25px;
  border-radius: 20px;
  color: #b30059;
  max-width: 400px;
  text-align: center;
}
</style>
</head>

<body>

<div class="loading-screen" id="loadingScreen">
  Loading memories for Ila...
</div>

<div class="floating-hearts"></div>

<audio id="bgMusic" loop>
  <source src="song.mp3" type="audio/mpeg">
</audio>

<div class="container">
  <div class="card">

    <div class="subtitle">FOR MY FAVORITE PERSON</div>
    <div class="title">Happy Birthday</div>
    <div class="name">Ila ♡</div>

    <div class="intro">
      <p>a little universe made just for you</p>
      <button onclick="showMemory(1)">continue ♡</button>
    </div>

    <div class="memory" id="memory1">
      <div class="polaroid">
        <img src="ila1.jpg">
        <span>our memories ♡</span>
      </div>
      <p>happy birthday my love</p>
      <button onclick="showMemory(2)">next</button>
    </div>

    <div class="memory" id="memory2">
      <div class="polaroid">
        <img src="ila5.jpg">
        <span>you are loved ♡</span>
      </div>
      <p>you mean so much to me</p>
      <button onclick="showMemory(3)">next</button>
    </div>

    <div class="memory" id="memory3">
      <div class="polaroid">
        <img src="ila7.jpg">
        <span>forever ♡</span>
      </div>
      <p>thank you for existing</p>
    </div>

    <div class="chat-box">
      <div class="chat-msg me">remember this?</div>
      <div class="chat-msg her">i miss you already</div>
      <div class="chat-msg me">you're my favourite person</div>
      <div class="chat-msg her">♡</div>
    </div>

  </div>
</div>

<div class="popup" id="popup">
  <div class="popup-content">
    <p id="popupText"></p>
    <button onclick="closePopup()">close</button>
  </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function () {

  setTimeout(() => {
    document.getElementById("loadingScreen")?.classList.add("hidden");
  }, 2500);

  const container = document.querySelector(".floating-hearts");

  if (container) {
    for (let i = 0; i < 20; i++) {
      const h = document.createElement("div");
      h.classList.add("heart");
      h.innerHTML = "♡";
      h.style.left = Math.random() * 100 + "vw";
      h.style.animationDuration = (5 + Math.random() * 5) + "s";
      container.appendChild(h);
    }
  }

});

function showMemory(num) {
  document.querySelectorAll(".memory").forEach(m => m.classList.remove("active"));
  document.getElementById("memory" + num)?.classList.add("active");
}

function openPopup(text) {
  document.getElementById("popupText").innerText = text;
  document.getElementById("popup").style.display = "flex";
}

function closePopup() {
  document.getElementById("popup").style.display = "none";
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Happy Birthday Ila ♡</title>

<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300;400;500;600&family=Press+Start+2P&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Fredoka', sans-serif;
  background: linear-gradient(135deg,#ffd6ec,#d9f0ff,#e6d8ff);
  min-height: 100vh;
  overflow-x: hidden;
  color: #b30059;
}

/* loading */
.loading-screen {
  position: fixed;
  inset: 0;
  background: linear-gradient(135deg,#ffcce6,#d9f0ff,#e5d4ff);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  z-index: 9999;
  transition: opacity 1s ease;
}

.loading-screen.hidden {
  opacity: 0;
  pointer-events: none;
}

/* layout */
.container {
  display: flex;
  justify-content: center;
  padding: 30px;
  position: relative;
  z-index: 2;
}

.card {
  max-width: 850px;
  width: 100%;
  background: rgba(255,255,255,0.25);
  backdrop-filter: blur(20px);
  border-radius: 35px;
  padding: 40px;
  text-align: center;
  box-shadow: 0 10px 30px rgba(0,0,0,0.1);
}

/* memories */
.memory {
  display: none;
  margin-top: 20px;
}

.memory.active {
  display: block;
}

button {
  margin-top: 15px;
  padding: 12px 25px;
  border-radius: 999px;
  border: none;
  cursor: pointer;
  background: white;
  color: #b30059;
  font-weight: bold;
}

/* polaroid */
.polaroid {
  background: white;
  padding: 15px 15px 60px;
  border-radius: 12px;
  width: 280px;
  margin: 20px auto;
  box-shadow: 0 10px 25px rgba(0,0,0,0.15);
  position: relative;
}

.polaroid img {
  width: 100%;
  height: 260px;
  object-fit: cover;
  border-radius: 8px;
}

.polaroid span {
  position: absolute;
  bottom: 15px;
  left: 0;
  right: 0;
  text-align: center;
  color: #b30059;
}

/* popup */
.popup {
  position: fixed;
  inset: 0;
  display: none;
  align-items: center;
  justify-content: center;
  background: rgba(0,0,0,0.3);
  z-index: 9999;
}

.popup-content {
  background: white;
  padding: 25px;
  border-radius: 20px;
  max-width: 400px;
  color: #b30059;
}

/* hearts */
.heart {
  position: absolute;
  animation: float 8s linear infinite;
  opacity: 0.5;
}

@keyframes float {
  from { transform: translateY(100vh); }
  to { transform: translateY(-10vh); }
}
</style>
</head>

<body>

<!-- LOADING -->
<div class="loading-screen" id="loadingScreen">
  Loading memories for Ila...
</div>

<!-- HEARTS -->
<div id="hearts"></div>

<div class="container">
  <div class="card">

    <h1>Happy Birthday Ila ♡</h1>

    <button onclick="showMemory(1)">Start</button>

    <div class="memory" id="memory1">
      <div class="polaroid">
        <img src="ila1.jpg">
        <span>our memories</span>
      </div>
      <p>happy birthday my love ♡</p>
      <button onclick="showMemory(2)">Next</button>
    </div>

    <div class="memory" id="memory2">
      <div class="polaroid">
        <img src="ila5.jpg">
        <span>you are loved</span>
      </div>
      <p>you mean so much to me</p>
      <button onclick="showMemory(3)">Next</button>
    </div>

    <div class="memory" id="memory3">
      <div class="polaroid">
        <img src="ila7.jpg">
        <span>forever</span>
      </div>
      <p>thank you for existing</p>
    </div>

  </div>
</div>

<!-- POPUP -->
<div class="popup" id="popup">
  <div class="popup-content">
    <p id="popupText"></p>
    <button onclick="closePopup()">close</button>
  </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", () => {

  // loading fix
  setTimeout(() => {
    document.getElementById("loadingScreen").classList.add("hidden");
  }, 2500);

  // hearts safe
  const container = document.getElementById("hearts");

  for (let i = 0; i < 18; i++) {
    const h = document.createElement("div");
    h.className = "heart";
    h.innerHTML = "♡";
    h.style.left = Math.random() * 100 + "vw";
    h.style.fontSize = (10 + Math.random() * 20) + "px";
    h.style.animationDuration = (5 + Math.random() * 5) + "s";

    container.appendChild(h);
  }
});

// memory system (FIXED)
function showMemory(num) {
  document.querySelectorAll(".memory").forEach(m => {
    m.classList.remove("active");
  });

  const el = document.getElementById("memory" + num);
  if (el) el.classList.add("active");
}

// popup
function openPopup(text) {
  document.getElementById("popupText").innerText = text;
  document.getElementById("popup").style.display = "flex";
}

function closePopup() {
  document.getElementById("popup").style.display = "none";
}
</script>

</body>
</html>

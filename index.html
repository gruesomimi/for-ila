<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Ila ♡</title>

<style>
body {
  font-family: Arial;
  background: linear-gradient(135deg,#ffd6ec,#d9f0ff,#e6d8ff);
  color: #b30059;
  text-align: center;
  margin: 0;
  padding: 20px;
}

/* hide all memories */
.memory {
  display: none;
  margin-top: 20px;
}

/* show active memory */
.memory.active {
  display: block;
}

button {
  padding: 10px 20px;
  border-radius: 20px;
  border: none;
  cursor: pointer;
  margin-top: 10px;
}

.card {
  max-width: 600px;
  margin: auto;
  background: rgba(255,255,255,0.3);
  padding: 20px;
  border-radius: 20px;
}
</style>
</head>

<body>

<div class="card">

  <h1>Happy Birthday Ila ♡</h1>

  <button onclick="showMemory(1)">Start</button>

  <div class="memory" id="memory1">
    <p>💗 first memory</p>
    <button onclick="showMemory(2)">Next</button>
  </div>

  <div class="memory" id="memory2">
    <p>💗 second memory</p>
    <button onclick="showMemory(3)">Next</button>
  </div>

  <div class="memory" id="memory3">
    <p>💗 final memory</p>
  </div>

</div>

<script>
function showMemory(num) {

  // hide all memories first
  document.querySelectorAll(".memory").forEach(m => {
    m.classList.remove("active");
  });

  // show selected memory
  const el = document.getElementById("memory" + num);

  if (el) {
    el.classList.add("active");
  } else {
    console.log("Memory not found:", num);
  }
}
</script>

</body>
</html>

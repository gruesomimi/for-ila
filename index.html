<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Happy Birthday My Love Ila ♡</title>

<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Fredoka', sans-serif;
  background: linear-gradient(135deg,#ffd6ec,#d9f0ff,#e6d8ff);
  min-height: 100vh;
  overflow-x: hidden;
  color: #b30059;
}

/* LOADING */
.loading {
  position: fixed;
  inset: 0;
  background: linear-gradient(135deg,#ffcce6,#d9f0ff,#e5d4ff);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 9999;
  transition: opacity 1s ease;
  flex-direction: column;
}

.loading.hidden {
  opacity: 0;
  pointer-events: none;
}

/* PAGES */
.page {
  display: none;
  min-height: 100vh;
  padding: 40px;
  text-align: center;
  animation: fade 0.8s ease;
}

.page.active {
  display: block;
}

@keyframes fade {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

/* CARD */
.card {
  max-width: 800px;
  margin: auto;
  background: rgba(255,255,255,0.25);
  backdrop-filter: blur(20px);
  border-radius: 30px;
  padding: 40px;
}

/* BUTTON */
button {
  margin-top: 20px;
  padding: 12px 25px;
  border-radius: 999px;
  border: none;
  background: white;
  color: #b30059;
  font-weight: bold;
  cursor: pointer;
}

/* SLIDESHOW */
.slide {
  display: none;
}

.slide.active {
  display: block;
}

/* POLAROID */
.polaroid {
  background: white;
  padding: 15px 15px 50px;
  width: 260px;
  margin: 20px auto;
  border-radius: 10px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.15);
}

.polaroid img {
  width: 100%;
  height: 250px;
  object-fit: cover;
  border-radius: 8px;
}

/* ENVELOPES */
.envelope {
  background: rgba(255,255,255,0.4);
  padding: 20px;
  border-radius: 20px;
  margin: 10px;
  cursor: pointer;
}

/* POPUP */
.popup {
  position: fixed;
  inset: 0;
  display: none;
  align-items: center;
  justify-content: center;
  background: rgba(0,0,0,0.3);
}

.popup-content {
  background: white;
  padding: 25px;
  border-radius: 20px;
  max-width: 400px;
  color: #b30059;
}

/* TYPEWRITER */
.typewriter {
  overflow: hidden;
  border-right: 2px solid #b30059;
  white-space: nowrap;
  animation: typing 4s steps(40) forwards;
}

@keyframes typing {
  from { width: 0 }
  to { width: 100% }
}

/* HEARTS */
.heart {
  position: absolute;
  animation: float 8s linear infinite;
  opacity: 0.5;
}

@keyframes float {
  from { transform: translateY(100vh); }
  to { transform: translateY(-10vh); }
}

/* MUSIC */
.music {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: white;
  width: 60px;
  height: 60px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
}
</style>
</head>

<body>

<!-- LOADING -->
<div class="loading" id="loading">
  <h2>loading your universe ♡</h2>
</div>

<!-- HEARTS -->
<div id="hearts"></div>

<!-- MUSIC -->
<div class="music" onclick="toggleMusic()">♫</div>
<audio id="music" loop>
  <source src="song.mp3" type="audio/mpeg">
</audio>

<!-- PAGE 1 -->
<div class="page active" id="page1">
  <div class="card">
    <h1>Happy Birthday Ila ♡</h1>
    <p class="typewriter">a little universe made just for you</p>
    <button onclick="goPage(2)">enter →</button>
  </div>
</div>

<!-- PAGE 2 (SLIDESHOW) -->
<div class="page" id="page2">
  <div class="card">

    <h2>beautiful baby</h2>

    <div class="slide active">
      <div class="polaroid">
        <img src="ila1.jpg">
      </div>
      <p>you are my safe place</p>
    </div>

    <div class="slide">
      <div class="polaroid">
        <img src="ila5.jpg">
      </div>
      <p>you make life softer</p>
    </div>

    <div class="slide">
      <div class="polaroid">
        <img src="ila7.jpg">
      </div>
      <p>forever grateful for you</p>
    </div>

    <button onclick="nextSlide()">next memory →</button>
    <button onclick="goPage(3)">final page →</button>

  </div>
</div>

<!-- PAGE 3 -->
<div class="page" id="page3">
  <div class="card">

    <h2>open when… 💌</h2>

    <div class="envelope" onclick="openLetter('sad')">open when sad</div>
    <div class="envelope" onclick="openLetter('miss')">open when you miss me</div>
    <div class="envelope" onclick="openLetter('happy')">open when happy</div>

  </div>
</div>

<!-- POPUP -->
<div class="popup" id="popup">
  <div class="popup-content">
    <p id="popupText"></p>
    <button onclick="closePopup()">close</button>
  </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", () => {

  setTimeout(() => {
    document.getElementById("loading").classList.add("hidden");
  }, 2000);

  const h = document.getElementById("hearts");

  for (let i = 0; i < 25; i++) {
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "♡";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.animationDuration = (5 + Math.random() * 5) + "s";
    h.appendChild(heart);
  }

});

// PAGE SWITCH
function goPage(num) {
  document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
  document.getElementById("page" + num).classList.add("active");
}

/* SLIDESHOW */
let slideIndex = 0;
function nextSlide() {
  const slides = document.querySelectorAll(".slide");
  slides[slideIndex].classList.remove("active");

  slideIndex = (slideIndex + 1) % slides.length;

  slides[slideIndex].classList.add("active");
}

/* ENVELOPES */
function openLetter(type) {

  const messages = {
    sad: "hi biebie sayang, you're never alone. i'm always here with you ♡",
    miss: "if you miss me, i'm already missing you more.",
    happy: "i love seeing you happy. please stay like this forever."
  };

  document.getElementById("popupText").innerText = messages[type];
  document.getElementById("popup").style.display = "flex";
}

function closePopup() {
  document.getElementById("popup").style.display = "none";
}

/* MUSIC */
function toggleMusic() {
  const m = document.getElementById("music");
  if (m.paused) m.play();
  else m.pause();
}
</script>

</body>
</html>

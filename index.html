<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Happy Birthday Ila ♡</title>

<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Fredoka', sans-serif;
  background: linear-gradient(135deg,#ffd6ec,#d9f0ff,#e6d8ff);
  min-height: 100vh;
  overflow-x: hidden;
  color: #b30059;
}

/* LOADING */
.loading {
  position: fixed;
  inset: 0;
  background: linear-gradient(135deg,#ffcce6,#d9f0ff,#e5d4ff);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  z-index: 9999;
  transition: opacity 1s ease;
}

.loading.hidden {
  opacity: 0;
  pointer-events: none;
}

/* PAGES */
.page {
  display: none;
  min-height: 100vh;
  padding: 40px;
  text-align: center;
  animation: fade 0.8s ease;
}

.page.active {
  display: block;
}

@keyframes fade {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

/* CARD */
.card {
  max-width: 800px;
  margin: auto;
  background: rgba(255,255,255,0.25);
  backdrop-filter: blur(20px);
  border-radius: 30px;
  padding: 40px;
}

/* BUTTON */
button {
  margin-top: 20px;
  padding: 12px 25px;
  border-radius: 999px;
  border: none;
  background: white;
  color: #b30059;
  font-weight: bold;
  cursor: pointer;
}

/* POLAROID */
.polaroid {
  background: white;
  padding: 15px 15px 50px;
  width: 260px;
  margin: 20px auto;
  border-radius: 10px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.15);
}

.polaroid img {
  width: 100%;
  height: 250px;
  object-fit: cover;
  border-radius: 8px;
}

/* HEARTS */
.heart {
  position: absolute;
  animation: float 8s linear infinite;
  opacity: 0.5;
}

@keyframes float {
  from { transform: translateY(100vh); }
  to { transform: translateY(-10vh); }
}

/* MUSIC */
.music {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: white;
  border-radius: 50%;
  width: 60px;
  height: 60px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  z-index: 999;
}
</style>
</head>

<body>

<!-- LOADING -->
<div class="loading" id="loading">
  <h2>Loading memories for Ila ♡</h2>
</div>

<!-- HEARTS -->
<div id="hearts"></div>

<!-- MUSIC -->
<div class="music" onclick="toggleMusic()">♫</div>
<audio id="music" loop>
  <source src="song.mp3" type="audio/mpeg">
</audio>

<!-- PAGE 1 -->
<div class="page active" id="page1">
  <div class="card">
    <h1>Happy Birthday Ila ♡</h1>
    <p>a little universe made for you</p>
    <button onclick="goPage(2)">enter →</button>
  </div>
</div>

<!-- PAGE 2 -->
<div class="page" id="page2">
  <div class="card">

    <h2>our memories</h2>

    <div class="polaroid">
      <img src="ila1.jpg">
    </div>

    <p>you mean so much to me</p>

    <button onclick="goPage(3)">next page →</button>
  </div>
</div>

<!-- PAGE 3 -->
<div class="page" id="page3">
  <div class="card">

    <h2>final letter</h2>

    <p>
      happy birthday my love ♡<br><br>
      thank you for existing.<br>
      thank you for being my safe place.<br>
      thank you for everything.
    </p>

  </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", () => {

  setTimeout(() => {
    document.getElementById("loading").classList.add("hidden");
  }, 2000);

  // hearts
  const h = document.getElementById("hearts");

  for (let i = 0; i < 20; i++) {
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "♡";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.animationDuration = (5 + Math.random() * 5) + "s";
    h.appendChild(heart);
  }

});

// PAGE SWITCH
function goPage(num) {
  document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
  document.getElementById("page" + num).classList.add("active");
}

// MUSIC
function toggleMusic() {
  const m = document.getElementById("music");
  if (m.paused) m.play();
  else m.pause();
}
</script>

</body>
</html>

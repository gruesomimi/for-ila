<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Happy Birthday Ila ♡</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300;400;500;600&family=Press+Start+2P&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Fredoka', sans-serif;
  overflow-x: hidden;
  background: linear-gradient(135deg, #ffd6ec, #d9f0ff, #e6d8ff);
  min-height: 100vh;
  color: white;
}

/* loading */
.loading-screen {
  position: fixed;
  inset: 0;
  background: linear-gradient(135deg, #ffcce6, #d9f0ff, #e5d4ff);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  z-index: 99999;
  transition: opacity 1s ease;
}

.loading-screen.hidden {
  opacity: 0;
  pointer-events: none;
}

/* hearts */
.floating-hearts {
  position: fixed;
  inset: 0;
  pointer-events: none;
}

.heart {
  position: absolute;
  animation: float 8s linear infinite;
  opacity: 0.6;
}

@keyframes float {
  from { transform: translateY(100vh); }
  to { transform: translateY(-10vh); }
}

/* layout */
.container {
  position: relative;
  z-index: 2;
  display: flex;
  justify-content: center;
  padding: 30px;
}

.card {
  max-width: 850px;
  width: 100%;
  background: rgba(255,255,255,0.18);
  backdrop-filter: blur(20px);
  border-radius: 30px;
  padding: 40px;
  text-align: center;
}

/* memories */
.memory { display: none; }
.memory.active { display: block; }

button {
  margin-top: 20px;
  padding: 12px 25px;
  border-radius: 999px;
  border: none;
  cursor: pointer;
}

.popup {
  position: fixed;
  inset: 0;
  display: none;
  align-items: center;
  justify-content: center;
  background: rgba(0,0,0,0.3);
}

.popup-content {
  background: white;
  padding: 30px;
  border-radius: 20px;
  color: black;
  max-width: 400px;
}
</style>
</head>

<body>

<!-- LOADING -->
<div class="loading-screen" id="loadingScreen">
  <h2>Loading memories...</h2>
</div>

<!-- HEARTS -->
<div class="floating-hearts"></div>

<!-- MUSIC -->
<audio id="bgMusic" loop>
  <source src="song.mp3" type="audio/mpeg">
</audio>

<div class="container">
  <div class="card">

    <h1>Happy Birthday Ila ♡</h1>

    <button onclick="showMemory(1)">Start</button>

    <div class="memory" id="memory1">
      <p>happy birthday my love ♡</p>
      <button onclick="showMemory(2)">next</button>
    </div>

    <div class="memory" id="memory2">
      <p>you mean a lot to me</p>
      <button onclick="showMemory(3)">next</button>
    </div>

    <div class="memory" id="memory3">
      <p>forever grateful for you</p>
    </div>

    <div class="popup" id="popup">
      <div class="popup-content">
        <p id="popupText"></p>
        <button onclick="closePopup()">close</button>
      </div>
    </div>

  </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function () {

  // remove loading screen safely
  setTimeout(() => {
    const load = document.getElementById("loadingScreen");
    if (load) load.classList.add("hidden");
  }, 2500);

  // floating hearts safely
  const heartContainer = document.querySelector(".floating-hearts");
  if (heartContainer) {
    for (let i = 0; i < 15; i++) {
      const h = document.createElement("div");
      h.classList.add("heart");
      h.innerHTML = "♡";
      h.style.left = Math.random() * 100 + "vw";
      h.style.fontSize = (10 + Math.random() * 20) + "px";
      h.style.animationDuration = (5 + Math.random() * 5) + "s";
      heartContainer.appendChild(h);
    }
  }

});

// memory switching
function showMemory(num) {
  document.querySelectorAll(".memory").forEach(m => m.classList.remove("active"));
  const el = document.getElementById("memory" + num);
  if (el) el.classList.add("active");
}

// popup
function openPopup(text) {
  document.getElementById("popupText").innerText = text;
  document.getElementById("popup").style.display = "flex";
}

function closePopup() {
  document.getElementById("popup").style.display = "none";
}
</script>

</body>
</html>
